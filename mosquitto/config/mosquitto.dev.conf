# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Mosquitto DEV Configuration (local development only)
# Used by docker-compose.override.yml — anonymous access, no auth needed.
# DO NOT use this in production.
# ═══════════════════════════════════════════════════════════════════════════════

listener 1883 0.0.0.0
protocol mqtt

# Development: allow anonymous connections (no credentials required)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Tuning
max_inflight_messages 20
max_queued_messages   1000
message_size_limit    65536
