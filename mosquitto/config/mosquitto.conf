# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Eclipse Mosquitto 2.x Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# ── MQTT Listener (IoT nodes connect here over LAN) ─────────────────────────
listener 1883 0.0.0.0
protocol mqtt

# ── Authentication ────────────────────────────────────────────────────────────
# Development: allow_anonymous true for initial bring-up.
# Production : set to false and enable password_file below.
#
#   To generate password file:
#     docker exec smartstua_mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>
#   Then set: allow_anonymous false
#             password_file /mosquitto/config/passwd
#
allow_anonymous true
# password_file /mosquitto/config/passwd

# ── Topic ACL (Access Control List) ──────────────────────────────────────────
# Uncomment to restrict topics once auth is enabled.
# acl_file /mosquitto/config/acl

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Tuning ────────────────────────────────────────────────────────────────────
max_inflight_messages 20
max_queued_messages   1000
message_size_limit    65536
