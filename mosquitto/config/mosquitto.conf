# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Eclipse Mosquitto 2.x Production Configuration
#
# SECURITY: Anonymous connections disabled. All clients must authenticate.
#
# Setup steps (run once after first docker compose up):
#
#   1. Create the bridge/backend user:
#      docker exec -it smartstua_mosquitto \
#        mosquitto_passwd -c /mosquitto/config/passwd bridge
#      (enter the password from your .env MQTT_PASSWORD)
#
#   2. Add ESP32 node users (one per physical device):
#      docker exec -it smartstua_mosquitto \
#        mosquitto_passwd /mosquitto/config/passwd NODE_001
#
#   3. Restart mosquitto:
#      docker compose restart mosquitto
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── MQTT Listener ─────────────────────────────────────────────────────────────
listener 1883 0.0.0.0
protocol mqtt

# ── Authentication ─────────────────────────────────────────────────────────────
# PRODUCTION: anonymous connections are DISABLED.
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Topic ACL (Access Control List) ───────────────────────────────────────────
# Restricts which clients can publish/subscribe to which topics.
# See mosquitto/config/acl for the ruleset.
acl_file /mosquitto/config/acl

# ── Persistence ────────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Logging ────────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Tuning ─────────────────────────────────────────────────────────────────────
max_inflight_messages 20
max_queued_messages   1000
message_size_limit    65536
