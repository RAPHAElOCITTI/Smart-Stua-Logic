# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Local Development Overrides
#
# This file is automatically merged with docker-compose.yml by Docker Compose
# when you run `docker compose up` locally. It NEVER runs in production.
#
# What it changes from the production compose:
#   1. Exposes backend port 8000 directly (Nginx not needed for local dev)
#   2. Disables the certbot service (no TLS locally)
#   3. Optionally uses local Mosquitto for MQTT (start with --profile local-mqtt)
#      instead of HiveMQ Cloud — useful when working offline.
#      To use: docker compose --profile local-mqtt up
#      Then override backend MQTT env vars:
#        MQTT_BROKER=mosquitto MQTT_PORT=1883 MQTT_USE_TLS=False
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Backend: expose port 8000 directly for local API access ──────────────────
  backend:
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  # ── Nginx: disabled locally (backend is directly accessible on 8000) ─────────
  nginx:
    profiles:
      - production

  # ── Certbot: disabled locally ─────────────────────────────────────────────────
  certbot:
    profiles:
      - production
