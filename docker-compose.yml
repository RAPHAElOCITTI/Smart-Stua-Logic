# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Master Docker Compose
# Usage: docker compose up -d --build
# Note: For local development without Nginx/Certbot, temporarily comment out
#       the nginx and certbot services and expose backend port 8000 directly.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: smartstua_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-smartstua_db}
      POSTGRES_USER:     ${POSTGRES_USER:-smartstua}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error - POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartstua} -d ${POSTGRES_DB:-smartstua_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartstua_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Eclipse Mosquitto 2 (Local dev MQTT only) ────────────────────────────────
  # Production uses HiveMQ Cloud (port 8883/TLS). Mosquitto is for local dev.
  # Start with: docker compose --profile local-mqtt up mosquitto
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartstua_mosquitto
    restart: unless-stopped
    profiles:
      - local-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/config/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - internal

  # ── Django / Gunicorn ─────────────────────────────────────────────────────────
  # SECURITY: Port 8000 is NOT exposed to the host in production.
  # All traffic comes through the Nginx service on ports 80/443.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: smartstua_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL:  postgres://${POSTGRES_USER:-smartstua}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartstua_db}
      REDIS_HOST:    redis
      REDIS_URL:     redis://redis:6379/0
      # HiveMQ Cloud — TLS on port 8883
      MQTT_BROKER:   ${MQTT_BROKER:-5d2b4f49284d429da0268114f3839cc4.s1.eu.hivemq.cloud}
      MQTT_PORT:     ${MQTT_PORT:-8883}
      MQTT_USE_TLS:  ${MQTT_USE_TLS:-True}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    volumes:
      - static_files:/app/staticfiles
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy + TLS ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: smartstua_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - static_files:/app/staticfiles:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Certbot (Let's Encrypt auto-renewal) ──────────────────────────────────────
  # First-time cert issuance (run once before starting nginx):
  #   docker compose run --rm certbot certonly --webroot \
  #     --webroot-path=/var/www/certbot \
  #     -d smartstua-backend.onrender.com \
  #     --email raphaelocitti@gmail.com --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    container_name: smartstua_certbot
    restart: on-failure
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: smartstua_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL:  postgres://${POSTGRES_USER:-smartstua}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartstua_db}
      REDIS_HOST:    redis
      REDIS_URL:     redis://redis:6379/0
    command:
      - celery
      - -A
      - smartstua
      - worker
      - --loglevel=info
      - --concurrency=2
      - --logfile=/app/logs/celery_worker.log
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: smartstua_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL:  postgres://${POSTGRES_USER:-smartstua}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartstua_db}
      REDIS_HOST:    redis
      REDIS_URL:     redis://redis:6379/0
    command:
      - celery
      - -A
      - smartstua
      - beat
      - --loglevel=info
      - --logfile=/app/logs/celery_beat.log
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── MQTT Bridge ────────────────────────────────────────────────────────────────
  mqtt_bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: smartstua_mqtt_bridge
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL:  postgres://${POSTGRES_USER:-smartstua}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartstua_db}
      REDIS_HOST:    redis
      REDIS_URL:     redis://redis:6379/0
      # HiveMQ Cloud — TLS on port 8883
      MQTT_BROKER:   ${MQTT_BROKER:-5d2b4f49284d429da0268114f3839cc4.s1.eu.hivemq.cloud}
      MQTT_PORT:     ${MQTT_PORT:-8883}
      MQTT_USE_TLS:  ${MQTT_USE_TLS:-True}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    command:
      - python
      - manage.py
      - mqtt_bridge
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal


# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  static_files:
    driver: local
  backend_logs:
    driver: local
  certbot_webroot:
    driver: local
  letsencrypt:
    driver: local


# ── Networks ──────────────────────────────────────────────────────────────────
# "internal" network: all inter-service communication.
# DB and Redis: NO exposed ports (internal only).
# Mosquitto: port 1883 exposed for ESP32 LAN nodes.
# Nginx: ports 80/443 are the ONLY public entry points.
networks:
  internal:
    driver: bridge
