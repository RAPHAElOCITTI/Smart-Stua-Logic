# ═══════════════════════════════════════════════════════════════════════════════
# Smart-Stua — Nginx Reverse Proxy Configuration
# Termination: HTTPS on 443 via Let's Encrypt (Certbot webroot challenge)
# Domain: smartstua-backend.onrender.com (Render free subdomain)
#         Replace with your custom domain if you add one via Render settings.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Rate Limiting Zones (network layer, before Django ratelimit) ──────────────
# Zone "login_zone": 10 MB shared memory; 10 req/min per IP on auth endpoints
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

# Zone "iot_zone": 20 MB shared memory; 120 req/min per IP on ingestion endpoint
limit_req_zone $binary_remote_addr zone=iot_zone:20m rate=120r/m;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name smartstua-backend.onrender.com;

    # Certbot ACME challenge — must be reachable over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name smartstua-backend.onrender.com;

    # ── TLS Certificates (Let's Encrypt via Certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/smartstua-backend.onrender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartstua-backend.onrender.com/privkey.pem;

    # Modern TLS settings (Mozilla Intermediate profile)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Static Files (served directly — bypasses Django/Gunicorn) ────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Auth Endpoints — strict rate limit (10 req/min) ─────────────────────
    location /api/auth/login/ {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:8000;
        include            /etc/nginx/proxy_params;
    }

    location /api/auth/register/ {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:8000;
        include            /etc/nginx/proxy_params;
    }

    # ── IoT Ingestion — moderate rate limit (120 req/min) ───────────────────
    location /api/readings/ {
        limit_req zone=iot_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:8000;
        include            /etc/nginx/proxy_params;
    }

    # ── All Other API Endpoints ───────────────────────────────────────────────
    location / {
        proxy_pass         http://backend:8000;
        include            /etc/nginx/proxy_params;
    }
}
